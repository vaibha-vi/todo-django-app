<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #a5f3fc, #fcd34d);
            min-height: 100vh;
        }

        .card {
            border-radius: 20px;
        }

        .input-group-text {
            cursor: pointer;
        }

        .match {
            color: green;
            font-size: 13px;
        }

        .nomatch {
            color: red;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">

    <div class="card shadow-lg p-4 border-0" style="width: 350px;">

        <h3 class="text-center mb-4">
            <i class="fa-solid fa-user-plus"></i> Sign Up
        </h3>

        {% if form.errors %}
            <div class="alert alert-danger p-2">
                Please fix the errors below
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-2">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>

            <div class="input-group mb-2">
                <input type="password" name="password1" id="password1" class="form-control" placeholder="Password" required>
                <span class="input-group-text" onclick="togglePassword('password1', this)">
                    <i class="fa-solid fa-eye"></i>
                </span>
            </div>

            <div class="input-group mb-1">
                <input type="password" name="password2" id="password2" class="form-control" placeholder="Confirm Password" required>
                <span class="input-group-text" onclick="togglePassword('password2', this)">
                    <i class="fa-solid fa-eye"></i>
                </span>
            </div>

            <div id="matchMsg"></div>

            <small class="text-muted">
                Password must be at least 8 characters
            </small>

            <button class="btn btn-success w-100 mt-2">
                Sign Up
            </button>
        </form>

        <p class="text-center mt-3">
            Already have an account? <a href="{% url 'login' %}">Login</a>
        </p>

    </div>

</div>

<script>
function togglePassword(id, icon) {
    const input = document.getElementById(id);
    const i = icon.querySelector("i");

    if (input.type === "password") {
        input.type = "text";
        i.classList.remove("fa-eye");
        i.classList.add("fa-eye-slash");
    } else {
        input.type = "password";
        i.classList.remove("fa-eye-slash");
        i.classList.add("fa-eye");
    }
}

const p1 = document.getElementById("password1");
const p2 = document.getElementById("password2");
const msg = document.getElementById("matchMsg");

p2.addEventListener("keyup", () => {
    if (p1.value === p2.value && p1.value !== "") {
        msg.innerHTML = "Passwords match ✔";
        msg.className = "match";
    } else {
        msg.innerHTML = "Passwords do not match ❌";
        msg.className = "nomatch";
    }
});
</script>

</body>
</html>
